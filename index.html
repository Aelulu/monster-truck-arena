<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Truck Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #fff;
    }
    #speedo {
      position: absolute;
      bottom: 24px;
      right: 28px;
      text-align: right;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #speedo .value { font-size: 52px; font-weight: 800; line-height: 1; }
    #speedo .unit { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }
    #controls-hint {
      position: absolute;
      bottom: 24px;
      left: 28px;
      font-size: 13px;
      line-height: 1.7;
      opacity: 0.85;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      background: rgba(0,0,0,0.35);
      padding: 12px 16px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }
    #controls-hint kbd {
      display: inline-block;
      min-width: 22px;
      text-align: center;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      font-family: inherit;
      font-size: 12px;
    }
    #airtime {
      position: absolute;
      top: 20%;
      width: 100%;
      text-align: center;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #ffd24a;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
      opacity: 0;
      transition: opacity 0.15s;
    }
    #airtime.show { opacity: 1; }
    #truck-name {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #loading {
      position: absolute;
      top: 50%;
      width: 100%;
      text-align: center;
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="airtime">BIG AIR!</div>
    <div id="controls-hint">
      <kbd>W</kbd>/<kbd>S</kbd> or <kbd>&uarr;</kbd>/<kbd>&darr;</kbd> &mdash; drive &amp; reverse (pitch in air)<br />
      <kbd>A</kbd>/<kbd>D</kbd> or <kbd>&larr;</kbd>/<kbd>&rarr;</kbd> &mdash; steer<br />
      <kbd>Space</kbd> &mdash; jump &middot; again in air = front flip<br />
      <kbd>Shift</kbd> &mdash; boost 🔥 &nbsp; <kbd>L</kbd> &mdash; switch truck &nbsp; <kbd>M</kbd> &mdash; switch map &nbsp; <kbd>R</kbd> &mdash; reset<br />
      <span style="opacity:0.7">🎮 stick drive/steer &middot; LT/RT boost &middot; A jump/flip &middot; RB switch truck &middot; Y reset</span>
      <div id="controller-status" style="color:#7fe07f"></div>
    </div>
    <div id="truck-name"></div>
    <div id="speedo">
      <div id="crowd-hits" style="font-size:15px;font-weight:700;color:#ffd24a;margin-bottom:6px;"></div>
      <div class="value" id="speed-value">0</div>
      <div class="unit">MPH</div>
    </div>
    <div id="loading">LOADING ARENA&hellip;</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js?v1784501544"></script>
</body>
</html>
